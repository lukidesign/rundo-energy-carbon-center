<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0f1e; font-family: "Anthropic Sans", sans-serif; padding: 24px; min-height: 100vh; }

.title { color: #8899bb; font-size: 12px; letter-spacing: 1px; margin-bottom: 20px; }

.main-flow {
  display: flex;
  align-items: center;
  gap: 0;
  width: 100%;
  overflow-x: auto;
}

/* Pipe lines */
.pipe {
  height: 3px;
  flex: 1;
  min-width: 20px;
  position: relative;
}
.pipe-chw { background: #1e88e5; }
.pipe-chw-ret { background: #42a5c2; }
.pipe-cw { background: #e5841e; }
.pipe-cw-ret { background: #c24242; }

.pipe::after {
  content: '';
  position: absolute;
  right: -5px;
  top: 50%;
  transform: translateY(-50%);
  width: 0;
  height: 0;
}

/* Node cards */
.node-card {
  background: #111827;
  border: 1.5px solid #1e3a5f;
  border-radius: 12px;
  padding: 14px 18px;
  text-align: center;
  position: relative;
  flex-shrink: 0;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
.node-card:hover { border-color: #3a7bc8; background: #141e30; }

.node-card.circle {
  border-radius: 50%;
  width: 90px;
  height: 90px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px;
}

.node-card.chiller {
  border-color: #1a5c3a;
  background: #0d1f16;
  min-width: 180px;
}
.node-card.chiller:hover { border-color: #2e9a62; }

.node-card.cooling-tower {
  border-top: 3px solid #e5841e;
  min-width: 130px;
}

.node-card .node-title {
  font-size: 13px;
  font-weight: 500;
  color: #c8d8f0;
  margin-bottom: 2px;
}

.node-card .node-sub {
  font-size: 11px;
  color: #5577aa;
  margin-bottom: 6px;
}

.node-card .node-value {
  font-size: 20px;
  font-weight: 500;
  color: #4caf7d;
  margin: 4px 0;
}

.node-card .node-metric {
  font-size: 11px;
  color: #8899bb;
}

.node-card .node-status {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: #1a3a55;
  color: #4a90d9;
  display: inline-block;
  margin-top: 4px;
}

.node-card .node-status.warn {
  background: #3a2200;
  color: #e5a020;
}

.badge {
  position: absolute;
  top: -8px;
  left: 50%;
  transform: translateX(-50%);
  background: #0a0f1e;
  border: 1px solid #2a4a6f;
  border-radius: 6px;
  font-size: 10px;
  color: #5577aa;
  padding: 1px 6px;
  white-space: nowrap;
}

/* Full layout */
.diagram {
  display: flex;
  flex-direction: column;
  gap: 0;
  width: 100%;
}

.row {
  display: flex;
  align-items: center;
  width: 100%;
  position: relative;
}

/* Top: cooling side (condenser) */
.cw-row {
  display: flex;
  align-items: center;
  gap: 0;
  padding-bottom: 0;
}

/* Middle: chillers */
.chiller-section {
  display: flex;
  flex-direction: column;
  gap: 12px;
  flex: 1;
}

/* Bottom: CHW side (evaporator) */
.chw-row {
  display: flex;
  align-items: center;
  gap: 0;
}

/* Temperature labels on pipes */
.temp-label {
  font-size: 11px;
  color: #8899bb;
  position: absolute;
  white-space: nowrap;
  background: #0a0f1e;
  padding: 0 4px;
}

/* SVG diagram container */
.svg-container {
  width: 100%;
  overflow-x: auto;
}

/* Metric row inside chiller card */
.metrics {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin-top: 8px;
}
.metric-item { text-align: center; }
.metric-val { font-size: 16px; font-weight: 500; color: #4caf7d; }
.metric-lbl { font-size: 10px; color: #5577aa; }

/* Dot indicator */
.dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #4caf7d;
  margin-right: 4px;
  vertical-align: middle;
}
.dot.warn { background: #e5a020; }

/* Chiller row layout */
.chiller-row {
  display: flex;
  align-items: center;
  width: 100%;
  gap: 0;
  margin: 6px 0;
}

.section-label {
  font-size: 10px;
  letter-spacing: 1px;
  color: #3a5a8a;
  text-align: center;
  padding: 4px 0;
  border-top: 1px solid #1a2a3f;
  margin-top: 4px;
}
</style>

<!-- Detail panel -->

  <div style="font-size:11px; color:#e5a020; margin-top:6px;" id="d-status"></div>
</div>

<script>
function showDetail(name, val, meta, status) {
  document.getElementById('detail').style.display = 'block';
  document.getElementById('d-title').textContent = name;
  document.getElementById('d-val').textContent = val;
  document.getElementById('d-meta').textContent = meta;
  var s = document.getElementById('d-status');
  s.textContent = status || '';
  s.style.color = (status && status.toLowerCase().includes('above')) ? '#e5a020' : '#4a7a60';
